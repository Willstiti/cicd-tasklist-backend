sonar.projectKey=Willstiti_cicd-tasklist-backend
sonar.projectName=cicd-tasklist-backend
sonar.organization=willstiti
sonar.sourceEncoding=UTF-8

# Analyze only backend business logic.
sonar.sources=src/controllers,src/services
sonar.tests=src/__tests__
sonar.test.inclusions=src/__tests__/**/*.test.ts

# Reuse Vitest coverage and keep technical wiring out of quality metrics.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json

# Exclude non-business files from coverage and static analysis.
sonar.exclusions=src/app.ts,src/server.ts,src/routes/**,src/lib/**
sonar.coverage.exclusions=src/app.ts,src/server.ts,src/routes/**,src/lib/**